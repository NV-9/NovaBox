name: novabox-local

services:

  traefik:
    image: traefik:v3.6
    container_name: novabox-traefik-dev
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - novabox-net-dev
      - novabox-mc-net-dev

  novabox:
    build:
      context: ../..
      dockerfile: deploy/local/master/Dockerfile
    container_name: novabox-master-dev
    restart: unless-stopped
    command: sh -c "chmod +x /app/entrypoint-dev.sh && /app/entrypoint-dev.sh"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../backend:/app
      - ${DATA_PATH:-../../data}:/app/data
      - ${SERVERS_HOST_PATH:-../../data/servers}:/servers
      - novabox-cargo:/usr/local/cargo
      - novabox-target:/app/target
    environment:
      - DATABASE_URL=sqlite:///app/data/novabox.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - CARGO_TARGET_DIR=/app/target
      - SERVERS_HOST_PATH=${SERVERS_HOST_PATH}
      - DOCKER_NETWORK=novabox-mc-net-dev
      - COMPOSE_STACK_NAME=novabox-local
      - RUST_LOG=novabox=debug,tower_http=debug
      - VELOCITY_API_URL=http://novabox-velocity-dev:7000
      - VELOCITY_API_SECRET=${VELOCITY_API_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://lvh.me:8080/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - novabox-net-dev
      - novabox-mc-net-dev

  frontend:
    build:
      context: ../..
      dockerfile: deploy/local/panel/Dockerfile
    container_name: novabox-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ../../frontend:/app
      - ${DATA_PATH:-../../data}/node_modules:/app/node_modules
    environment:
      - BACKEND_URL=http://novabox:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.panel.rule=Host(`${DOMAIN:-lvh.me}`)"
      - "traefik.http.routers.panel.entrypoints=web"
      - "traefik.http.services.panel-svc.loadbalancer.server.port=3000"
    networks:
      - novabox-net-dev

  velocity:
    build:
      context: ../..
      dockerfile: deploy/local/velocity/Dockerfile
    container_name: novabox-velocity-dev
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      - TYPE=VELOCITY
      - MEMORY=512m
      - NOVABOX_API_PORT=7000
      - NOVABOX_API_SECRET=${VELOCITY_API_SECRET:-}
    volumes:
      - ${VELOCITY_PLUGIN_JAR:-../../velocity-plugin/target/novabox-velocity-1.0.0.jar}:/server/plugins/novabox-velocity.jar:ro
      - ${DATA_PATH:-../../data}/velocity.toml:/server/velocity.toml
      - ${DATA_PATH:-../../data}/forwarding.secret:/server/forwarding.secret
      - ${DATA_PATH:-../../data}/velocity-data:/server/data
    networks:
      - novabox-net-dev
      - novabox-mc-net-dev

networks:
  novabox-net-dev:
    driver: bridge
  novabox-mc-net-dev:
    external: true
    name: novabox-mc-net-dev

volumes:
  novabox-cargo:
  novabox-target:
